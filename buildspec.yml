version: 0.2

# Environment Configuration
# This buildspec is for the DEV environment
# For PROD, update environment variables accordingly
env:
  variables:
    VITE_API_URL: $VITE_API_URL
    VITE_GOOGLE_MAPS_API_KEY: $VITE_GOOGLE_MAPS_API_KEY

phases:
  install:
    runtime-versions:
      nodejs: 20
  pre_build:
    commands:
      - echo Installing dependencies...
      - node --version
      - npm --version
      - npm ci
      - echo Installed packages count
      - ls node_modules | wc -l
  build:
    commands:
      - echo Build started on $(date)
      - echo "Building with VITE_API_URL=${VITE_API_URL}"
      - npm run build
      - echo Build output size
      - du -sh dist/
  post_build:
    commands:
      - echo Deploying to S3...
      - aws s3 sync ./dist s3://"${BUCKET_NAME}" --delete --cache-control "public, max-age=31536000, immutable" --exclude "index.html"
      - aws s3 cp ./dist/index.html s3://"${BUCKET_NAME}"/index.html --cache-control "no-cache, no-store, must-revalidate"
      - echo Invalidating CloudFront cache...
      - aws cloudfront create-invalidation --distribution-id "${CLOUDFRONT_ID}" --paths "/*"
      - echo Deployment completed on $(date)

artifacts:
  files:
    - "dist/**/*"
